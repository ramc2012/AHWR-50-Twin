; =============================================================================
; CRMF Ansible inventory (EXAMPLE)
;
; Copy to deploy/ansible/inventory.ini and edit for your site.
;
; Topology (proposal §6.4): RKE2 HA control plane (3 servers) + worker agents,
; plus a DR site that mirrors the layout for warm standby. All nodes are
; reachable over SSH; the first server (rke2_servers[0]) bootstraps the cluster
; and is where the kubeconfig + helm/operator installs run.
;
; Required per-host vars:
;   ansible_host         routable IP/hostname
;   node_labels          (optional) comma-separated k8s node labels
; Group-level connection vars are at the bottom.
; =============================================================================

; -------- Primary site: RKE2 server (control-plane) nodes --------------------
[rke2_servers]
crmf-cp1 ansible_host=10.20.0.11 rke2_node_role=server-bootstrap
crmf-cp2 ansible_host=10.20.0.12 rke2_node_role=server
crmf-cp3 ansible_host=10.20.0.13 rke2_node_role=server

; -------- Primary site: RKE2 agent (worker) nodes ----------------------------
[rke2_agents]
crmf-w1 ansible_host=10.20.0.21 node_labels="crmf.ongc.local/role=app"
crmf-w2 ansible_host=10.20.0.22 node_labels="crmf.ongc.local/role=app"
crmf-w3 ansible_host=10.20.0.23 node_labels="crmf.ongc.local/role=data"
crmf-w4 ansible_host=10.20.0.24 node_labels="crmf.ongc.local/role=data"

; -------- DR site: server + agent nodes (warm standby cluster) ---------------
[dr_servers]
crmf-dr-cp1 ansible_host=10.30.0.11 rke2_node_role=server-bootstrap
crmf-dr-cp2 ansible_host=10.30.0.12 rke2_node_role=server
crmf-dr-cp3 ansible_host=10.30.0.13 rke2_node_role=server

[dr_agents]
crmf-dr-w1 ansible_host=10.30.0.21 node_labels="crmf.ongc.local/role=app"
crmf-dr-w2 ansible_host=10.30.0.22 node_labels="crmf.ongc.local/role=data"

; -------- Composite groups ---------------------------------------------------
; The first server in each cluster runs cluster-level installs (helm, CRs).
[rke2_primary:children]
rke2_servers
rke2_agents

[rke2_dr:children]
dr_servers
dr_agents

; All RKE2 server nodes (primary + DR) — used for control-plane tuning.
[servers:children]
rke2_servers
dr_servers

; All RKE2 agent nodes (primary + DR).
[agents:children]
rke2_agents
dr_agents

; Everything that runs RKE2.
[rke2:children]
servers
agents

; -------- Connection defaults ------------------------------------------------
[all:vars]
ansible_user=ansible
ansible_become=true
ansible_become_method=sudo
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file=~/.ssh/crmf_ops_ed25519
ansible_ssh_common_args=-o StrictHostKeyChecking=accept-new
; The bootstrap server (where kubeconfig is fetched and cluster installs run).
; Defaults to the first primary control-plane node.
crmf_bootstrap_host=crmf-cp1
crmf_dr_bootstrap_host=crmf-dr-cp1
