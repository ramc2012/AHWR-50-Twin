{{- if not .Values.externalSecret.enabled }}
# -----------------------------------------------------------------------------
# crmf-secrets (plaintext, NON-PRODUCTION ONLY)
#
# PRODUCTION: set externalSecret.enabled=true so this manifest is NOT rendered,
# and provision the Secret named "crmf-secrets" out-of-band via an ExternalSecret
# (External Secrets Operator) backed by HashiCorp Vault. Do NOT commit real
# credentials to values.yaml / values-prod.yaml.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: crmf-secrets
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "crmf.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- if .Values.metrics.token }}
  # Optional /metrics bearer token (#15). Only rendered when metrics.token is set.
  METRICS_TOKEN: {{ .Values.metrics.token | quote }}
  {{- end }}
{{- end }}
