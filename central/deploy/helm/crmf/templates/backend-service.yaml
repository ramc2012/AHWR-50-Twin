apiVersion: v1
kind: Service
metadata:
  # FIXED name (not release-prefixed) — referenced by Ingress, NetworkPolicy and ServiceMonitor.
  name: crmf-backend
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "crmf.backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "crmf.backend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
