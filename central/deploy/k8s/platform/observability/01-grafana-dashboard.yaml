apiVersion: v1
kind: ConfigMap
metadata:
  name: crmf-grafana-dashboard
  namespace: crmf
  labels:
    # The grafana_dashboard label is what the Grafana sidecar (kube-prometheus-stack)
    # watches for; it auto-imports any ConfigMap carrying this label.
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: crmf
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: crmf-grafana-dashboard
    app.kubernetes.io/component: observability
  annotations:
    # Folder the sidecar will file this dashboard under (provider must allow it).
    k8s-sidecar-target-directory: "/tmp/dashboards/CRMF"
    grafana_folder: "CRMF"
data:
  crmf-fleet-ingest.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "id": 1,
          "type": "piechart",
          "title": "Fleet status breakdown",
          "description": "Rig count by status (crmf_fleet_rigs gauge).",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "sum by (status) (crmf_fleet_rigs)",
              "refId": "A",
              "legendFormat": "{{status}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "values": [
                "value",
                "percent"
              ]
            },
            "pieType": "donut",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "mappings": [],
              "unit": "short"
            },
            "overrides": []
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Rigs reporting",
          "description": "Total rigs known to the fleet (sum of crmf_fleet_rigs across all statuses).",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "sum(crmf_fleet_rigs)",
              "refId": "A",
              "legendFormat": "rigs"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "green",
                    "value": 40
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Rigs online",
          "description": "Rigs currently in status=online.",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "sum(crmf_fleet_rigs{status=\"online\"})",
              "refId": "A",
              "legendFormat": "online"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Rigs offline",
          "description": "Rigs currently in status=offline (OFFLINE_SEC=120s threshold).",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 4
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "sum(crmf_fleet_rigs{status=\"offline\"})",
              "refId": "A",
              "legendFormat": "offline"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 10
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Offline ratio",
          "description": "Fraction of the fleet that is offline.",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 4
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "sum(crmf_fleet_rigs{status=\"offline\"}) / clamp_min(sum(crmf_fleet_rigs), 1)",
              "refId": "A",
              "legendFormat": "offline ratio"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 0.1
                  },
                  {
                    "color": "red",
                    "value": 0.25
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Ingest rate",
          "description": "Batches, points and events ingested per second (rate over 5m).",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "sum(rate(crmf_ingest_batches_total[5m]))",
              "refId": "A",
              "legendFormat": "batches/s"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "sum(rate(crmf_ingest_points_total[5m]))",
              "refId": "B",
              "legendFormat": "points/s"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "sum(rate(crmf_ingest_events_total[5m]))",
              "refId": "C",
              "legendFormat": "events/s"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "lastNotNull",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "fillOpacity": 10,
                "showPoints": "never",
                "axisPlacement": "auto",
                "spanNulls": false,
                "stacking": {
                  "mode": "none",
                  "group": "A"
                }
              },
              "mappings": [],
              "unit": "cps"
            },
            "overrides": []
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Ingest errors",
          "description": "Ingest error rate per second (crmf_ingest_errors_total).",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "sum(rate(crmf_ingest_errors_total[5m]))",
              "refId": "A",
              "legendFormat": "errors/s"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "sum(rate(crmf_ingest_errors_total[5m])) / clamp_min(sum(rate(crmf_ingest_batches_total[5m])), 1)",
              "refId": "B",
              "legendFormat": "error ratio"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "lastNotNull",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "fillOpacity": 10,
                "showPoints": "never",
                "axisPlacement": "auto",
                "spanNulls": false,
                "stacking": {
                  "mode": "none",
                  "group": "A"
                }
              },
              "mappings": [],
              "unit": "short"
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "error ratio"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "percentunit"
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "p95 ingest duration",
          "description": "p50 / p95 / p99 of crmf_ingest_duration_seconds (histogram_quantile over 5m).",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 16
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "histogram_quantile(0.50, sum by (le) (rate(crmf_ingest_duration_seconds_bucket[5m])))",
              "refId": "A",
              "legendFormat": "p50"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "histogram_quantile(0.95, sum by (le) (rate(crmf_ingest_duration_seconds_bucket[5m])))",
              "refId": "B",
              "legendFormat": "p95"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "histogram_quantile(0.99, sum by (le) (rate(crmf_ingest_duration_seconds_bucket[5m])))",
              "refId": "C",
              "legendFormat": "p99"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "lastNotNull",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "fillOpacity": 10,
                "showPoints": "never",
                "axisPlacement": "auto",
                "spanNulls": false,
                "stacking": {
                  "mode": "none",
                  "group": "A"
                }
              },
              "mappings": [],
              "unit": "s"
            },
            "overrides": []
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Alarm counts",
          "description": "Rate of ingested events per second (alarms/ESD/lockout signals arrive as events). Monitoring-only: these are read-only alarm indications, never written back to any rig/PLC.",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 16
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "sum(rate(crmf_ingest_events_total[5m]))",
              "refId": "A",
              "legendFormat": "events/s (alarms)"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "lastNotNull",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "bars",
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "fillOpacity": 60,
                "showPoints": "never",
                "axisPlacement": "auto",
                "spanNulls": false,
                "stacking": {
                  "mode": "normal",
                  "group": "A"
                }
              },
              "mappings": [],
              "unit": "cps"
            },
            "overrides": []
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "crmf",
        "fleet",
        "ingest",
        "monitoring"
      ],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Prometheus",
            "multi": false,
            "name": "DS_PROMETHEUS",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "CRMF \u2014 Fleet & Ingest Overview",
      "uid": "crmf-fleet-ingest",
      "version": 1,
      "weekStart": ""
    }
