---
# MinIO — S3-compatible object store for the CRMF platform.
#
# Provides the object storage backplane for (proposal §5.1, §6.4):
#   * crmf-reports  — generated PDF/CSV rig reports and historian exports
#   * crmf-backups  — CloudNativePG base backups + WAL archive, and Kafka/MM2 archives
#   * crmf-mlflow   — MLflow model artifacts and registered model versions
#
# Deployment shape: this manifest uses a plain StatefulSet + headless/ClusterIP Services
# (single-node, distributed-ready) rather than the MinIO Operator Tenant CRD, so the
# platform has NO hard dependency on the MinIO Operator being installed. For a production
# HA install you may instead apply the operator and a Tenant CR (see minio/README.md);
# the bucket names, Service name (minio), and credentials Secret contract are identical.
#
# Buckets are created on first start by an init container + the bundled `mc` client
# (the `minio/mc` image), so no manual post-install step is required.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crmf-minio
  namespace: crmf
  labels:
    app.kubernetes.io/part-of: crmf
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: object-store
automountServiceAccountToken: false
---
# Root credentials for MinIO. Replace these defaults in production (or, preferably,
# materialise this Secret from Vault via External Secrets — see vault/01-secretstore.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: crmf-minio-credentials
  namespace: crmf
  labels:
    app.kubernetes.io/part-of: crmf
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: object-store
type: Opaque
stringData:
  # MINIO_ROOT_USER / MINIO_ROOT_PASSWORD are the S3 access/secret keys for the root account.
  MINIO_ROOT_USER: "crmf-minio-admin"
  MINIO_ROOT_PASSWORD: "ChangeMe-MinIO-Root-Pass-9f2c"
---
# S3 API service (port 9000) — consumed by CNPG (barman-cloud), MLflow, Kafka Connect, backend.
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: crmf
  labels:
    app.kubernetes.io/part-of: crmf
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: object-store
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: object-store
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
      protocol: TCP
    - name: console
      port: 9001
      targetPort: 9001
      protocol: TCP
---
# Headless service required by the StatefulSet for stable per-pod DNS (distributed mode).
apiVersion: v1
kind: Service
metadata:
  name: minio-hl
  namespace: crmf
  labels:
    app.kubernetes.io/part-of: crmf
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: object-store
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: object-store
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: crmf
  labels:
    app.kubernetes.io/part-of: crmf
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: object-store
spec:
  serviceName: minio-hl
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
      app.kubernetes.io/component: object-store
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: crmf
        app.kubernetes.io/managed-by: kubectl
        app.kubernetes.io/name: minio
        app.kubernetes.io/component: object-store
    spec:
      serviceAccountName: crmf-minio
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2024-10-13T13-34-11Z
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          envFrom:
            - secretRef:
                name: crmf-minio-credentials
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/part-of: crmf
          app.kubernetes.io/name: minio
          app.kubernetes.io/component: object-store
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 200Gi
---
# One-shot Job that waits for MinIO, then creates the required buckets and sets a
# 90-day expiry lifecycle on the backups bucket. Idempotent: `mc mb -p` is a no-op
# if the bucket already exists. Re-runnable on every apply.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-init
  namespace: crmf
  labels:
    app.kubernetes.io/part-of: crmf
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: object-store-init
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: crmf
        app.kubernetes.io/name: minio
        app.kubernetes.io/component: object-store-init
    spec:
      restartPolicy: OnFailure
      serviceAccountName: crmf-minio
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mc
          image: quay.io/minio/mc:RELEASE.2024-10-08T09-37-26Z
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for MinIO S3 endpoint..."
              until mc alias set crmf http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "  minio not ready, retrying in 5s"; sleep 5
              done
              mc mb -p crmf/crmf-reports
              mc mb -p crmf/crmf-backups
              mc mb -p crmf/crmf-mlflow
              # Keep object-store backups bounded; CNPG/Kafka retention is the source of truth.
              mc ilm rule add crmf/crmf-backups --expire-days 90 || true
              echo "Bucket initialisation complete."
              mc ls crmf
          envFrom:
            - secretRef:
                name: crmf-minio-credentials
          env:
            - name: HOME
              value: /tmp
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
