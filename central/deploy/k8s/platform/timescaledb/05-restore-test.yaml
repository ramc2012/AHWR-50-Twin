# =====================================================================
# CRMF — Centralised Rig Monitoring Facility
# Backup RESTORE-VERIFICATION CronJob (#28)
#
# Backups that are never test-restored are false comfort: a corrupt
# object store, an image/extension mismatch (the README warns of exactly
# this), or a broken WAL chain is only discovered during a real disaster.
#
# This CronJob bootstraps a THROWAWAY CloudNativePG cluster
# ("crmf-timescaledb-restoretest") from the LATEST base backup + WAL in
# the primary's MinIO/S3 bucket, waits for it to reach a healthy primary,
# runs sanity checks (timescaledb extension present, expected hypertables
# exist, latest telemetry ts within the RPO window), pushes a success/zero
# gauge to the Prometheus Pushgateway, then DELETES the throwaway cluster.
#
# If you do not run a Pushgateway, the metric push is best-effort (|| true)
# and the Job still fails loudly (non-zero exit) when a check fails — which
# the CRMFRestoreTestStale alert (observability/00-prometheusrule.yaml) and
# the standard Kubernetes job-failure alerting will surface.
#
# MONITORING-ONLY: this only READS the backup object store and stands up a
# transient read cluster; nothing is written back to any rig or PLC.
# =====================================================================
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crmf-restore-test
  namespace: crmf
  labels:
    app.kubernetes.io/part-of: crmf
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: crmf-timescaledb-restore-test
    app.kubernetes.io/component: database-restore-test
automountServiceAccountToken: true
---
# Least-privilege RBAC: the verifier may create/get/delete ONLY CNPG Clusters
# (to stand up + tear down the throwaway cluster) and read pods/secrets it needs
# to connect. Scoped to the crmf namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crmf-restore-test
  namespace: crmf
  labels:
    app.kubernetes.io/part-of: crmf
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: crmf-timescaledb-restore-test
    app.kubernetes.io/component: database-restore-test
rules:
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crmf-restore-test
  namespace: crmf
  labels:
    app.kubernetes.io/part-of: crmf
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: crmf-timescaledb-restore-test
    app.kubernetes.io/component: database-restore-test
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: crmf-restore-test
subjects:
  - kind: ServiceAccount
    name: crmf-restore-test
    namespace: crmf
---
# The throwaway recovery Cluster manifest, templated into the verifier as a
# ConfigMap. Recovers from the primary site's object store (same bucket the
# primary archives WAL/base backups into). Minimal 1-instance footprint; it is
# deleted at the end of every run.
apiVersion: v1
kind: ConfigMap
metadata:
  name: crmf-restore-test-cluster
  namespace: crmf
  labels:
    app.kubernetes.io/part-of: crmf
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: crmf-timescaledb-restore-test
    app.kubernetes.io/component: database-restore-test
data:
  cluster.yaml: |
    apiVersion: postgresql.cnpg.io/v1
    kind: Cluster
    metadata:
      name: crmf-timescaledb-restoretest
      namespace: crmf
      labels:
        app.kubernetes.io/part-of: crmf
        app.kubernetes.io/name: crmf-timescaledb-restoretest
        app.kubernetes.io/component: database-restore-test
    spec:
      description: "Throwaway restore-verification cluster (#28) — deleted after each run"
      # MUST be the same TimescaleDB-enabled image as the primary so WAL replay and
      # the timescaledb extension are binary-compatible.
      imageName: ghcr.io/imusmanmalik/timescaledb-postgis:16
      imagePullPolicy: IfNotPresent
      instances: 1
      storage:
        size: 50Gi
      walStorage:
        size: 20Gi
      resources:
        requests:
          cpu: "500m"
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 4Gi
      postgresql:
        shared_preload_libraries:
          - timescaledb
        parameters:
          timescaledb.telemetry_level: "off"
      enableSuperuserAccess: true
      superuserSecret:
        name: crmf-db-superuser
      # Recover (bootstrap) from the primary site's object store — latest backup + WAL.
      bootstrap:
        recovery:
          source: primarySite
      externalClusters:
        - name: primarySite
          barmanObjectStore:
            serverName: crmf-timescaledb
            destinationPath: s3://crmf-backups/crmf-timescaledb
            endpointURL: http://minio:9000   # in-cluster MinIO serves plain HTTP (#6)
            s3Credentials:
              accessKeyId:
                name: crmf-backup-s3
                key: ACCESS_KEY_ID
              secretAccessKey:
                name: crmf-backup-s3
                key: SECRET_ACCESS_KEY
            wal:
              maxParallel: 4
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: crmf-timescaledb-restore-test
  namespace: crmf
  labels:
    app.kubernetes.io/part-of: crmf
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: crmf-timescaledb-restore-test
    app.kubernetes.io/component: database-restore-test
spec:
  # Weekly: 03:30 every Sunday (after the daily base backups have accumulated).
  schedule: "30 3 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 1800
  jobTemplate:
    spec:
      # Generous: bootstrap + WAL replay + checks + teardown.
      activeDeadlineSeconds: 5400
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: crmf
            app.kubernetes.io/name: crmf-timescaledb-restore-test
            app.kubernetes.io/component: database-restore-test
        spec:
          restartPolicy: Never
          serviceAccountName: crmf-restore-test
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: restore-verify
              # bitnami/kubectl ships a non-root kubectl; mirror to Harbor for air-gapped.
              image: bitnami/kubectl:1.30
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  NS=crmf
                  CL=crmf-timescaledb-restoretest
                  PUSHGW="${PUSHGATEWAY_URL:-http://prometheus-pushgateway.monitoring.svc:9091}"
                  RPO_MAX_SECONDS="${RPO_MAX_SECONDS:-7200}"   # latest ts must be within 2h
                  OK=0

                  cleanup() {
                    echo "Tearing down throwaway cluster ${CL} ..."
                    kubectl -n "$NS" delete cluster "$CL" --ignore-not-found --wait=false || true
                    # Best-effort metric push (Pushgateway optional).
                    if command -v curl >/dev/null 2>&1; then
                      printf 'crmf_restore_test_success %s\ncrmf_restore_test_timestamp_seconds %s\n' \
                        "$OK" "$(date +%s)" \
                        | curl -fsS --data-binary @- \
                          "${PUSHGW}/metrics/job/crmf-restore-test" >/dev/null 2>&1 || true
                    fi
                  }
                  trap cleanup EXIT

                  echo "Creating throwaway recovery cluster from latest backup ..."
                  kubectl -n "$NS" apply -f /etc/restore-test/cluster.yaml

                  echo "Waiting for ${CL} to reach a healthy primary (up to ~75m) ..."
                  for i in $(seq 1 150); do
                    PHASE="$(kubectl -n "$NS" get cluster "$CL" -o jsonpath='{.status.phase}' 2>/dev/null || true)"
                    READY="$(kubectl -n "$NS" get cluster "$CL" -o jsonpath='{.status.readyInstances}' 2>/dev/null || echo 0)"
                    echo "  attempt $i: phase='${PHASE}' readyInstances='${READY}'"
                    if [ "${READY:-0}" = "1" ] && echo "$PHASE" | grep -qi "healthy"; then
                      break
                    fi
                    sleep 30
                  done

                  POD="$(kubectl -n "$NS" get pods -l cnpg.io/cluster="$CL",cnpg.io/instanceRole=primary -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
                  if [ -z "$POD" ]; then
                    POD="$(kubectl -n "$NS" get pods -l cnpg.io/cluster="$CL" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
                  fi
                  if [ -z "$POD" ]; then
                    echo "FAIL: restored cluster never produced a usable pod"; exit 1
                  fi

                  q() { kubectl -n "$NS" exec "$POD" -c postgres -- psql -U postgres -d crmf -tAc "$1"; }

                  echo "Check 1: timescaledb extension present ..."
                  q "SELECT 1 FROM pg_extension WHERE extname='timescaledb';" | grep -q 1

                  echo "Check 2: expected hypertables exist (telemetry, events) ..."
                  HT="$(q "SELECT count(*) FROM timescaledb_information.hypertables WHERE hypertable_name IN ('telemetry','events');")"
                  [ "${HT:-0}" -ge 2 ]

                  echo "Check 3: telemetry has rows ..."
                  ROWS="$(q "SELECT count(*) FROM telemetry;")"
                  echo "  telemetry rows: ${ROWS}"
                  [ "${ROWS:-0}" -ge 1 ]

                  echo "Check 4: latest telemetry ts within RPO window (${RPO_MAX_SECONDS}s) ..."
                  LAG="$(q "SELECT COALESCE(EXTRACT(EPOCH FROM (now() - max(ts)))::bigint, 999999999) FROM telemetry;")"
                  echo "  latest-ts lag: ${LAG}s"
                  # Informational: a stale lag is warned, not failed (the backup may simply
                  # predate fresh ingest); the alert below catches a stale verification run.
                  if [ "${LAG:-999999999}" -gt "$RPO_MAX_SECONDS" ]; then
                    echo "  WARN: latest restored ts is older than the RPO window"
                  fi

                  echo "All restore-verification checks PASSED."
                  OK=1
              env:
                - name: PUSHGATEWAY_URL
                  value: "http://prometheus-pushgateway.monitoring.svc:9091"
                - name: RPO_MAX_SECONDS
                  value: "7200"
                - name: HOME
                  value: /tmp
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: cluster-manifest
                  mountPath: /etc/restore-test
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: cluster-manifest
              configMap:
                name: crmf-restore-test-cluster
            - name: tmp
              emptyDir: {}
