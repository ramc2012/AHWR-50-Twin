---
# ServiceAccount whose token External Secrets Operator exchanges via the Vault
# Kubernetes auth method (see 00-vault-note.md for the matching Vault role binding).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crmf-vault-auth
  namespace: crmf
  labels:
    app.kubernetes.io/part-of: crmf
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: crmf-vault-auth
    app.kubernetes.io/component: secrets
---
# Namespaced SecretStore pointing ESO at HashiCorp Vault (KV v2 mount "crmf").
# Authenticates with the Kubernetes auth method using the crmf-vault-auth SA token.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: crmf-vault
  namespace: crmf
  labels:
    app.kubernetes.io/part-of: crmf
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: crmf-vault
    app.kubernetes.io/component: secrets
spec:
  provider:
    vault:
      # Environment-specific default — point at the ONGC enterprise Vault in production.
      server: "https://vault.ongc.local:8200"
      path: "crmf"          # KV mount path
      version: "v2"
      # caProvider/caBundle omitted: defaults to the system trust store. For the ONGC
      # internal CA, add caProvider referencing a ConfigMap with the CA bundle.
      auth:
        kubernetes:
          mountPath: "kubernetes"     # Vault auth mount
          role: "crmf-backend"        # Vault role bound to crmf-vault-auth SA
          serviceAccountRef:
            name: crmf-vault-auth
---
# ExternalSecret that materialises the "crmf-secrets" Secret consumed by the backend.
# Pulls the four backend secrets from Vault KV path crmf/data/backend and writes them
# into a single Opaque Secret using the exact keys the shared spec defines.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: crmf-secrets
  namespace: crmf
  labels:
    app.kubernetes.io/part-of: crmf
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: crmf-secrets
    app.kubernetes.io/component: secrets
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: crmf-vault
    kind: SecretStore
  target:
    name: crmf-secrets        # the Secret the backend mounts via envFrom
    creationPolicy: Owner      # ESO creates and fully manages this Secret
    deletionPolicy: Retain     # keep the Secret if the ExternalSecret is deleted
    template:
      type: Opaque
  data:
    - secretKey: PGPASSWORD
      remoteRef:
        key: backend           # -> crmf/data/backend
        property: PGPASSWORD
    - secretKey: JWT_SECRET
      remoteRef:
        key: backend
        property: JWT_SECRET
    - secretKey: INGEST_TOKEN
      remoteRef:
        key: backend
        property: INGEST_TOKEN
    - secretKey: ADMIN_PASSWORD
      remoteRef:
        key: backend
        property: ADMIN_PASSWORD
---
# crmf_app login credentials for CNPG managed.roles (audit #2). The backend connects as
# the least-privilege role crmf_app (Helm config.PGUSER=crmf_app), and the TimescaleDB
# Cluster CR (timescaledb/00-cluster.yaml managed.roles) sets crmf_app's password from
# THIS Secret. The password is pulled from the SAME Vault key as crmf-secrets PGPASSWORD,
# so crmf_app's password always equals the backend's PGPASSWORD — otherwise the backend
# Deployment crash-loops with "password authentication failed for user crmf_app".
# Without this ExternalSecret, the Cluster CR references a Secret nobody creates and a
# fresh prod apply breaks. type kubernetes.io/basic-auth: username is the literal role.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: crmf-db-app-login
  namespace: crmf
  labels:
    app.kubernetes.io/part-of: crmf
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: crmf-db-app-login
    app.kubernetes.io/component: secrets
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: crmf-vault
    kind: SecretStore
  target:
    name: crmf-db-app-login
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/basic-auth
      data:
        username: "crmf_app"
        password: "{{ .PGPASSWORD }}"
  data:
    - secretKey: PGPASSWORD
      remoteRef:
        key: backend           # -> crmf/data/backend (SAME key as crmf-secrets.PGPASSWORD)
        property: PGPASSWORD
