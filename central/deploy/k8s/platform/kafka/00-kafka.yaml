# =============================================================================
# CRMF Ingestion Backbone — Apache Kafka (Strimzi Operator)
# Proposal §6.4: MQTT broker + Apache Kafka, decoupled ingestion, derived channels.
#
# Cluster: crmf-kafka (3 brokers, KRaft mode)
# Strimzi >= 0.40 with KRaft enabled (no ZooKeeper). Uses the KafkaNodePool +
# Kafka CR pair. If your Strimzi predates stable KRaft, set spec.kafka.replicas
# and drop the node pools / KRaft annotations to fall back to 3 ZooKeeper nodes.
#
# Listeners:
#   9092  internal  plain (in-cluster, SCRAM-SHA-512 auth)        name: plain
#   9093  internal  tls   (in-cluster, SCRAM-SHA-512 over TLS)    name: tls
#   9094  external  tls   (optional, off by default — see note)   name: external
#
# Metrics: JMX Prometheus Exporter, rules sourced from ConfigMap
#          "crmf-kafka-metrics" (see 04-metrics-configmap.yaml).
#
# MONITORING-ONLY platform: Kafka carries rig->central telemetry/events only.
# Nothing in this backbone writes back to any rig/PLC.
# =============================================================================
---
# KRaft controller+broker node pool. dual-role keeps the footprint to 3 pods.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: crmf-kafka-pool
  namespace: crmf
  labels:
    app.kubernetes.io/part-of: crmf
    app.kubernetes.io/managed-by: strimzi
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: broker
    strimzi.io/cluster: crmf-kafka
spec:
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 100Gi
        kraftMetadata: shared
        deleteClaim: false
        # storageClassName: ongc-fast-ssd   # uncomment to pin a class
  resources:
    requests:
      cpu: "500m"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
  jvmOptions:
    -Xms: 1536m
    -Xmx: 1536m
  template:
    pod:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: crmf-kafka
  namespace: crmf
  labels:
    app.kubernetes.io/part-of: crmf
    app.kubernetes.io/managed-by: strimzi
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: broker
  annotations:
    # Enable KRaft + node pools (Strimzi >= 0.40).
    strimzi.io/kraft: enabled
    strimzi.io/node-pools: enabled
spec:
  kafka:
    version: 3.7.0
    # replicas/storage are taken from the KafkaNodePool above when node-pools
    # are enabled. Listeners, config, auth and metrics still live here.
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
        authentication:
          type: scram-sha-512
      - name: tls
        port: 9093
        type: internal
        tls: true
        authentication:
          type: scram-sha-512
      # External listener is OFF by default — the backbone is in-cluster only.
      # Uncomment to expose brokers to rig-edge agents publishing straight to
      # Kafka (most rigs use MQTT-TLS -> bridge instead; see ../mqtt/README.md).
      # - name: external
      #   port: 9094
      #   type: route          # or loadbalancer / nodeport / ingress
      #   tls: true
      #   authentication:
      #     type: scram-sha-512
    authorization:
      type: simple
    config:
      # Replication / durability for a 3-broker cluster.
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      # Allow large gzip telemetry batches forwarded from the HTTP /ingest path
      # and from device publishes (mirrors backend body limits).
      message.max.bytes: 10485760            # 10 MiB
      replica.fetch.max.bytes: 10485760
      auto.create.topics.enable: false       # topics are declared in 01-topics.yaml
      log.retention.hours: 168               # 7d default; per-topic overrides apply
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: crmf-kafka-metrics
          key: kafka-metrics-config.yml
    template:
      pod:
        securityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
  # entityOperator manages KafkaTopic (01) and KafkaUser (02) CRs.
  entityOperator:
    topicOperator:
      resources:
        requests:
          cpu: "100m"
          memory: 256Mi
        limits:
          cpu: "500m"
          memory: 512Mi
    userOperator:
      resources:
        requests:
          cpu: "100m"
          memory: 256Mi
        limits:
          cpu: "500m"
          memory: 512Mi
    template:
      pod:
        securityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
  # Cluster-level JMX/Prometheus for the Kafka Exporter (lag, offsets).
  kafkaExporter:
    topicRegex: ".*"
    groupRegex: ".*"
    resources:
      requests:
        cpu: "100m"
        memory: 128Mi
      limits:
        cpu: "500m"
        memory: 256Mi
