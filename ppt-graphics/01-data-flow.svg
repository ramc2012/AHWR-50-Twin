<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="675" rx="28" fill="url(#bg)"/>
  <text x="60" y="86" fill="#e5e7eb" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700">AHWR Digital Twin Data Flow</text>
  <text x="60" y="126" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="20">Real-time PLC telemetry to operator dashboard</text>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="55" y="238" width="165" height="145" rx="18" fill="#1e293b" stroke="#334155"/>
    <text x="137" y="294" text-anchor="middle" fill="#38bdf8" font-size="24" font-weight="700">PLC / Mock</text>
    <text x="137" y="331" text-anchor="middle" fill="#cbd5e1" font-size="17">S7comm</text>
    <text x="137" y="356" text-anchor="middle" fill="#cbd5e1" font-size="17">Modbus TCP</text>

    <rect x="285" y="238" width="165" height="145" rx="18" fill="#1e293b" stroke="#334155"/>
    <text x="367" y="294" text-anchor="middle" fill="#4ade80" font-size="24" font-weight="700">Telegraf</text>
    <text x="367" y="331" text-anchor="middle" fill="#cbd5e1" font-size="17">1 Hz collector</text>
    <text x="367" y="356" text-anchor="middle" fill="#cbd5e1" font-size="17">Hot reload config</text>

    <rect x="515" y="238" width="165" height="145" rx="18" fill="#1e293b" stroke="#334155"/>
    <text x="597" y="294" text-anchor="middle" fill="#fbbf24" font-size="24" font-weight="700">InfluxDB</text>
    <text x="597" y="331" text-anchor="middle" fill="#cbd5e1" font-size="17">Time-series</text>
    <text x="597" y="356" text-anchor="middle" fill="#cbd5e1" font-size="17">Historian</text>

    <rect x="745" y="238" width="165" height="145" rx="18" fill="#1e293b" stroke="#334155"/>
    <text x="827" y="294" text-anchor="middle" fill="#a78bfa" font-size="24" font-weight="700">Node API</text>
    <text x="827" y="331" text-anchor="middle" fill="#cbd5e1" font-size="17">Express</text>
    <text x="827" y="356" text-anchor="middle" fill="#cbd5e1" font-size="17">Socket.IO</text>

    <rect x="975" y="238" width="170" height="145" rx="18" fill="#1e293b" stroke="#334155"/>
    <text x="1060" y="294" text-anchor="middle" fill="#38bdf8" font-size="24" font-weight="700">Dashboard</text>
    <text x="1060" y="331" text-anchor="middle" fill="#cbd5e1" font-size="17">React + MUI</text>
    <text x="1060" y="356" text-anchor="middle" fill="#cbd5e1" font-size="17">Live gauges</text>
  </g>

  <g stroke="#38bdf8" stroke-width="5" fill="none" marker-end="url(#arrow)">
    <path d="M 224 310 L 276 310"/>
    <path d="M 454 310 L 506 310"/>
    <path d="M 684 310 L 736 310"/>
    <path d="M 914 310 L 966 310"/>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="300" y="465" width="600" height="72" rx="14" fill="#0f172a" stroke="#334155"/>
    <text x="600" y="494" text-anchor="middle" fill="#e5e7eb" font-size="19" font-weight="700">Operator value</text>
    <text x="600" y="521" text-anchor="middle" fill="#94a3b8" font-size="17">Live operations, alarms, trends, maintenance and workover state in one screen</text>
  </g>
</svg>
