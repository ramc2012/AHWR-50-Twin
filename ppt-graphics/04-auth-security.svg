<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#38bdf8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="675" rx="28" fill="url(#bg)"/>
  <text x="60" y="86" fill="#e5e7eb" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700">Authentication and Authorization</text>
  <text x="60" y="126" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="20">Local break-glass admin plus optional Windows domain login</text>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="90" y="225" width="220" height="120" rx="18" fill="#1e293b" stroke="#38bdf8"/>
    <text x="200" y="274" text-anchor="middle" fill="#38bdf8" font-size="24" font-weight="700">Login UI</text>
    <text x="200" y="309" text-anchor="middle" fill="#cbd5e1" font-size="17">username + password</text>

    <rect x="420" y="170" width="230" height="105" rx="18" fill="#1e293b" stroke="#4ade80"/>
    <text x="535" y="212" text-anchor="middle" fill="#4ade80" font-size="23" font-weight="700">Local Auth</text>
    <text x="535" y="244" text-anchor="middle" fill="#cbd5e1" font-size="17">bcrypt password</text>

    <rect x="420" y="315" width="230" height="105" rx="18" fill="#1e293b" stroke="#fbbf24"/>
    <text x="535" y="357" text-anchor="middle" fill="#fbbf24" font-size="23" font-weight="700">Active Directory</text>
    <text x="535" y="389" text-anchor="middle" fill="#cbd5e1" font-size="17">LDAP / LDAPS</text>

    <rect x="760" y="225" width="180" height="120" rx="18" fill="#1e293b" stroke="#a78bfa"/>
    <text x="850" y="274" text-anchor="middle" fill="#a78bfa" font-size="24" font-weight="700">JWT</text>
    <text x="850" y="309" text-anchor="middle" fill="#cbd5e1" font-size="17">8h token</text>

    <rect x="1000" y="170" width="130" height="70" rx="16" fill="#0f172a" stroke="#4ade80"/>
    <text x="1065" y="213" text-anchor="middle" fill="#4ade80" font-size="21" font-weight="700">Admin</text>
    <rect x="1000" y="270" width="130" height="70" rx="16" fill="#0f172a" stroke="#38bdf8"/>
    <text x="1065" y="313" text-anchor="middle" fill="#38bdf8" font-size="21" font-weight="700">Operator</text>
    <rect x="1000" y="370" width="130" height="70" rx="16" fill="#0f172a" stroke="#94a3b8"/>
    <text x="1065" y="413" text-anchor="middle" fill="#94a3b8" font-size="21" font-weight="700">Viewer</text>
  </g>

  <g stroke="#38bdf8" stroke-width="5" fill="none" marker-end="url(#arrow)">
    <path d="M 315 285 C 365 285 365 222 410 222"/>
    <path d="M 315 285 C 365 285 365 368 410 368"/>
    <path d="M 655 222 C 700 222 705 285 750 285"/>
    <path d="M 655 368 C 700 368 705 285 750 285"/>
    <path d="M 945 285 L 990 205"/>
    <path d="M 945 285 L 990 305"/>
    <path d="M 945 285 L 990 405"/>
  </g>

  <rect x="250" y="510" width="700" height="70" rx="14" fill="#0f172a" stroke="#334155"/>
  <text x="600" y="540" text-anchor="middle" fill="#e5e7eb" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">Server-side RBAC</text>
  <text x="600" y="566" text-anchor="middle" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="17">API routes and Socket.IO handshake require Bearer token authorization</text>
</svg>
