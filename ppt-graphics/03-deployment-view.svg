<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#172033"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1200" height="675" rx="28" fill="url(#bg)"/>
  <text x="60" y="86" fill="#e5e7eb" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700">Docker Deployment View</text>
  <text x="60" y="126" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="20">Only the dashboard is published to the host</text>

  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <rect x="70" y="235" width="220" height="110" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <text x="180" y="278" text-anchor="middle" fill="#38bdf8" font-size="24" font-weight="700">Operator</text>
    <text x="180" y="312" text-anchor="middle" fill="#cbd5e1" font-size="18">Browser</text>

    <rect x="415" y="160" width="670" height="365" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="750" y="205" text-anchor="middle" fill="#e5e7eb" font-size="28" font-weight="700">Docker Compose Internal Network</text>

    <rect x="470" y="255" width="155" height="95" rx="16" fill="#1e293b" stroke="#38bdf8"/>
    <text x="548" y="293" text-anchor="middle" fill="#38bdf8" font-size="21" font-weight="700">nginx</text>
    <text x="548" y="322" text-anchor="middle" fill="#cbd5e1" font-size="16">React UI</text>

    <rect x="690" y="255" width="155" height="95" rx="16" fill="#1e293b" stroke="#a78bfa"/>
    <text x="768" y="293" text-anchor="middle" fill="#a78bfa" font-size="21" font-weight="700">Backend</text>
    <text x="768" y="322" text-anchor="middle" fill="#cbd5e1" font-size="16">Express API</text>

    <rect x="910" y="255" width="155" height="95" rx="16" fill="#1e293b" stroke="#fbbf24"/>
    <text x="988" y="293" text-anchor="middle" fill="#fbbf24" font-size="21" font-weight="700">InfluxDB</text>
    <text x="988" y="322" text-anchor="middle" fill="#cbd5e1" font-size="16">Historian</text>

    <rect x="690" y="395" width="155" height="95" rx="16" fill="#1e293b" stroke="#4ade80"/>
    <text x="768" y="433" text-anchor="middle" fill="#4ade80" font-size="21" font-weight="700">Telegraf</text>
    <text x="768" y="462" text-anchor="middle" fill="#cbd5e1" font-size="16">PLC collector</text>

    <rect x="910" y="395" width="155" height="95" rx="16" fill="#1e293b" stroke="#22d3ee"/>
    <text x="988" y="433" text-anchor="middle" fill="#22d3ee" font-size="21" font-weight="700">Mock</text>
    <text x="988" y="462" text-anchor="middle" fill="#cbd5e1" font-size="16">Demo profile</text>
  </g>

  <g stroke="#94a3b8" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M 295 290 L 405 290"/>
    <path d="M 630 303 L 680 303"/>
    <path d="M 850 303 L 900 303"/>
    <path d="M 768 390 L 768 355"/>
    <path d="M 988 390 L 988 355"/>
  </g>
  <text x="350" y="265" fill="#38bdf8" font-family="Inter, Arial, sans-serif" font-size="18">127.0.0.1:8080</text>
  <text x="750" y="570" text-anchor="middle" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="20">Backend, InfluxDB, Telegraf and mock services are not published directly</text>
</svg>
