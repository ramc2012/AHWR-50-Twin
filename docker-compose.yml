# ROM-II / AHWR Digital Twin — local stack.
# Secrets come from .env (see .env.example). Only the frontend is published,
# and only on localhost; backend + InfluxDB stay on the internal network.
# Quickstart (with synthetic live data):  docker compose --profile demo up -d --build

services:
  influxdb:
    image: influxdb:2.7
    container_name: romii_influxdb
    restart: unless-stopped
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUX_USERNAME:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_PASSWORD:?set INFLUX_PASSWORD in .env}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUX_ORG:-romii_org}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUX_BUCKET:-romii_bucket}
      - DOCKER_INFLUXDB_INIT_RETENTION=${INFLUX_RETENTION:-30d}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN:?set INFLUX_TOKEN in .env}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    # Uncomment to access the InfluxDB UI from the host (localhost only):
    # ports:
    #   - "127.0.0.1:8086:8086"

  telegraf:
    image: telegraf:1.29
    container_name: romii_telegraf
    hostname: telegraf
    restart: unless-stopped
    # Hot-reload telegraf.conf when the backend rewrites it (no Docker socket needed).
    command: telegraf --config /etc/telegraf/telegraf.conf --watch-config=poll
    volumes:
      - ./telegraf:/etc/telegraf
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG:-romii_org}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-romii_bucket}
    depends_on:
      influxdb:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: romii_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATA_DIR=/data
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG:-romii_org}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-romii_bucket}
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET in .env}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      - DATA_SOURCE=${DATA_SOURCE:-plc}
      - TELEGRAF_CONFIG_PATH=/telegraf/telegraf.conf
      - CORS_ORIGIN=${CORS_ORIGIN:-}
      # --- Windows domain / Active Directory login (optional) ---
      - AUTH_MODE=${AUTH_MODE:-local}            # local | ldap | both
      - LDAP_URL=${LDAP_URL:-}
      - LDAP_BIND_DN=${LDAP_BIND_DN:-}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD:-}
      - LDAP_SEARCH_BASE=${LDAP_SEARCH_BASE:-}
      - LDAP_SEARCH_FILTER=${LDAP_SEARCH_FILTER:-}
      - LDAP_DOMAIN=${LDAP_DOMAIN:-}
      - LDAP_DEFAULT_ROLE=${LDAP_DEFAULT_ROLE:-viewer}
      - LDAP_ROLE_ADMIN=${LDAP_ROLE_ADMIN:-}
      - LDAP_ROLE_OPERATOR=${LDAP_ROLE_OPERATOR:-}
      - LDAP_ROLE_VIEWER=${LDAP_ROLE_VIEWER:-}
      - LDAP_STARTTLS=${LDAP_STARTTLS:-}
      - LDAP_TLS_REJECT_UNAUTHORIZED=${LDAP_TLS_REJECT_UNAUTHORIZED:-true}
    volumes:
      - backend_data:/data
      - ./telegraf:/telegraf   # backend rewrites the managed PLC section here
    depends_on:
      influxdb:
        condition: service_healthy
    # No host port: the backend is reachable only via the frontend's nginx proxy.

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: romii_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

  # Synthetic telemetry generator for local demos (no physical PLC).
  # Enabled only with:  docker compose --profile demo up
  mock:
    build: ./mock
    container_name: romii_mock
    restart: unless-stopped
    profiles: ["demo"]
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG:-romii_org}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-romii_bucket}
      - MOCK_INTERVAL_MS=${MOCK_INTERVAL_MS:-1000}
    depends_on:
      influxdb:
        condition: service_healthy

volumes:
  influxdb_data:
  backend_data:
