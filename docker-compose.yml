# ROM-II / AHWR Digital Twin — local stack.
# Secrets come from .env (see .env.example). Only the frontend is published,
# and only on localhost; backend + InfluxDB stay on the internal network.
# Quickstart (with synthetic live data):  docker compose --profile demo up -d --build

services:
  influxdb:
    image: influxdb:2.7
    container_name: AHWR_influxdb
    restart: unless-stopped
    # Resource bounds (audit remediation): the edge compose set no limits, so a
    # runaway InfluxDB compaction could starve the rig node. InfluxDB is the heaviest
    # edge consumer (TSM cache); tune to the box. Limits below suit a 4c/16GB rig PC.
    cpus: 2.0
    mem_limit: 2g
    mem_reservation: 512m
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUX_USERNAME:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_PASSWORD:?set INFLUX_PASSWORD in .env}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUX_ORG:-romii_org}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUX_BUCKET:-romii_bucket}
      - DOCKER_INFLUXDB_INIT_RETENTION=${INFLUX_RETENTION:-30d}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN:?set INFLUX_TOKEN in .env}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    # Uncomment to access the InfluxDB UI from the host (localhost only):
    # ports:
    #   - "127.0.0.1:8086:8086"

  telegraf:
    image: telegraf:1.29
    container_name: AHWR_telegraf
    hostname: telegraf
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 512m
    mem_reservation: 128m
    # Hot-reload telegraf.conf when the backend rewrites it (no Docker socket needed).
    # --config-directory loads telegraf.d/ (the outputs.health liveness probe) alongside
    # the backend-managed telegraf.conf, so the managed PLC section is never disturbed.
    command: telegraf --config /etc/telegraf/telegraf.conf --config-directory /etc/telegraf/telegraf.d --watch-config=poll
    volumes:
      - ./telegraf:/etc/telegraf
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG:-romii_org}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-romii_bucket}
    # Liveness (audit remediation: telegraf previously had NO healthcheck). The
    # outputs.health plugin (telegraf/telegraf.d/health.conf) serves 200 while the agent
    # and output pipeline are alive, 503 if the metric buffer wedges — so Docker now
    # flips a hung-but-running collector to 'unhealthy' instead of only acting on a full
    # crash. Data-freshness is separately scored by the backend /api/health/edge.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8888/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      influxdb:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: AHWR_backend
    restart: unless-stopped
    cpus: 1.5
    mem_limit: 1g
    mem_reservation: 256m
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATA_DIR=/data
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG:-romii_org}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-romii_bucket}
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET in .env}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      - DATA_SOURCE=${DATA_SOURCE:-plc}
      - TELEGRAF_CONFIG_PATH=/telegraf/telegraf.conf
      - CORS_ORIGIN=${CORS_ORIGIN:-}
      # --- Sync agent (store-and-forward to central CRMF; outbound only) ---
      - CENTRAL_URL=${CENTRAL_URL:-http://sync-sink:9009}
      - DEVICE_ID=${DEVICE_ID:-AHWR-50-3}
      - DEVICE_TOKEN=${DEVICE_TOKEN:-}
      - SYNC_ENABLED=${SYNC_ENABLED:-true}
      - SYNC_BATCH_SECONDS=${SYNC_BATCH_SECONDS:-10}
      - SYNC_BUFFER_DAYS=${SYNC_BUFFER_DAYS:-15}
      # --- ETP 2.0 publisher (outbound only) ---
      - ETP_ENABLED=${ETP_ENABLED:-true}
      - ETP_URL=${ETP_URL:-ws://etp-sink:9011}
      - ETP_STREAM_SECONDS=${ETP_STREAM_SECONDS:-5}
      # --- Windows domain / Active Directory login ---
      # Demo defaults target the bundled `openldap` test directory; in production
      # override these in .env to point at the real Domain Controller (AD over LDAPS).
      - AUTH_MODE=${AUTH_MODE:-both}             # local | ldap | both
      - LDAP_URL=${LDAP_URL:-ldap://openldap:1389}
      - LDAP_BIND_DN=${LDAP_BIND_DN:-cn=admin,dc=ahwr,dc=local}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD:-adminpassword}
      - LDAP_SEARCH_BASE=${LDAP_SEARCH_BASE:-ou=users,dc=ahwr,dc=local}
      - LDAP_SEARCH_FILTER=${LDAP_SEARCH_FILTER:-(|(uid={username})(cn={username})(sAMAccountName={username}))}
      - LDAP_DOMAIN=${LDAP_DOMAIN:-AHWR}
      - LDAP_DEFAULT_ROLE=${LDAP_DEFAULT_ROLE:-viewer}
      - LDAP_ROLE_ADMIN=${LDAP_ROLE_ADMIN:-rig-admins}
      - LDAP_ROLE_OPERATOR=${LDAP_ROLE_OPERATOR:-rig-operators}
      - LDAP_ROLE_VIEWER=${LDAP_ROLE_VIEWER:-rig-viewers}
      - LDAP_STARTTLS=${LDAP_STARTTLS:-}
      - LDAP_TLS_REJECT_UNAUTHORIZED=${LDAP_TLS_REJECT_UNAUTHORIZED:-false}
    volumes:
      - backend_data:/data
      - ./telegraf:/telegraf   # backend rewrites the managed PLC section here
    depends_on:
      influxdb:
        condition: service_healthy
    # No host port: the backend is reachable only via the frontend's nginx proxy.

  # Read-only MCP server: exposes the edge twin's telemetry/alarms/KPIs/history
  # to AI systems over the Model Context Protocol (streamable HTTP at /mcp).
  # It mints a viewer-role JWT, so the backend RBAC blocks any write.
  mcp-edge:
    build:
      context: ./edge-mcp-server
      dockerfile: Dockerfile
    container_name: AHWR_mcp_edge
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 192m
    mem_reservation: 48m
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BACKEND_URL=http://backend:5000
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET in .env}
      - MCP_API_KEY=${MCP_API_KEY:-}   # bearer guard on /mcp (set in .env)
      # TLS: serve HTTPS (required for Cowork / claude.ai connectors). Certs are
      # mounted read-only below; swap in a CA-signed cert for production.
      - TLS_CERT_FILE=/certs/mcp.crt
      - TLS_KEY_FILE=/certs/mcp.key
    volumes:
      - ./certs:/certs:ro
    ports:
      # Loopback-only by default (same posture as the HMI). Point AI clients at
      # https://127.0.0.1:8765/mcp ; set MCP_EDGE_BIND to expose on the LAN.
      - "${MCP_EDGE_BIND:-127.0.0.1}:${MCP_EDGE_PORT:-8765}:3000"
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: AHWR_frontend
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 256m
    mem_reservation: 64m
    ports:
      # Loopback-only by default: the HMI is published on 127.0.0.1 so it is not
      # exposed on all host interfaces. To reach it from operator workstations on
      # the rig LAN, set FRONTEND_BIND (e.g. the rig NIC's IP) or front it with the
      # rig firewall — don't drop the 127.0.0.1 prefix to bind 0.0.0.0 blindly.
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

  # Synthetic telemetry generator for local demos (no physical PLC).
  # Enabled only with:  docker compose --profile demo up
  mock:
    build: ./mock
    container_name: AHWR_mock
    restart: unless-stopped
    profiles: ["demo"]
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG:-romii_org}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-romii_bucket}
      - MOCK_INTERVAL_MS=${MOCK_INTERVAL_MS:-1000}
    depends_on:
      influxdb:
        condition: service_healthy

  # OPC UA server simulator (demo) — provides real OPC UA nodes so the Telegraf
  # opcua input can be validated end-to-end. Stands in for an OPC UA protocol device.
  opc-plc:
    image: mcr.microsoft.com/iotedge/opc-plc:2.12.29
    container_name: AHWR_opc_plc
    hostname: opc-plc
    restart: unless-stopped
    profiles: ["demo"]
    command: ["--autoaccept", "--unsecuretransport", "--portnum=50000", "--ph=opc-plc"]

  # Dedicated OPC UA collector (demo) — separate Telegraf lane for the opcua input,
  # independent of the S7comm collector (which fails closed without a real PLC).
  telegraf-opcua:
    image: telegraf:1.29
    container_name: AHWR_telegraf_opcua
    restart: unless-stopped
    profiles: ["demo"]
    command: telegraf --config /etc/telegraf/opcua.conf
    volumes:
      - ./telegraf:/etc/telegraf
    environment:
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG:-romii_org}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-romii_bucket}
    depends_on:
      influxdb:
        condition: service_healthy

  # Test directory (demo) — mock AD/LDAP server (ldapjs) standing in for the Windows
  # Domain Controller so the AD/LDAP login path is verifiable end-to-end. Seeds:
  #   driller1/Driller@123 (rig-operators), toolpusher1/Push@123 (rig-admins),
  #   viewer1/View@123 (rig-viewers). Admin bind: cn=admin,dc=ahwr,dc=local / adminpassword.
  openldap:
    build: ./ldap-test
    container_name: AHWR_openldap
    hostname: openldap
    restart: unless-stopped
    profiles: ["demo"]
    environment:
      - LDAP_PORT=1389
      - LDAP_ADMIN_PASSWORD=adminpassword

  # Local-demo central ingest stub (stands in for the CRMF / ETP-Kafka ingest).
  # Lets the edge store-and-forward loop be demonstrated end-to-end. Demo profile only.
  sync-sink:
    build: ./sync-sink
    container_name: AHWR_sync_sink
    restart: unless-stopped
    profiles: ["demo"]
    environment:
      - PORT=9009
      - INGEST_TOKEN=${DEVICE_TOKEN:-}

  # Local-demo ETP 2.0 server stub (stands in for the CRMF ETP server). Demo profile only.
  etp-sink:
    build: ./etp-sink
    container_name: AHWR_etp_sink
    restart: unless-stopped
    profiles: ["demo"]
    environment:
      - WS_PORT=9011
      - HTTP_PORT=9012

volumes:
  influxdb_data:
  backend_data:
