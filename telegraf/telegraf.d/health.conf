# Telegraf liveness endpoint — target of the docker-compose healthcheck.
#
# Loaded via `--config-directory /etc/telegraf/telegraf.d` (see docker-compose.yml),
# SEPARATELY from the backend-managed /etc/telegraf/telegraf.conf, so the managed PLC
# collector section is never disturbed when the backend rewrites it.
#
# The health output serves an HTTP endpoint that returns 200 while the agent and its
# output pipeline are alive, and 503 if the metric buffer stops flushing. This closes
# the "wedged-but-running collector" gap: Docker now marks telegraf 'unhealthy' instead
# of only reacting to a full process crash.
#
# Note: this is agent/pipeline LIVENESS, not data-freshness. Whether a specific PLC tag
# is still updating is scored by the backend (GET /api/health/edge). To also fail this
# probe when throughput stops, add a [[outputs.health.compares]] block on a field that
# should always be present.
[[outputs.health]]
  service_address = "tcp://:8888"
  read_timeout = "5s"
  write_timeout = "5s"
