# Dedicated OPC UA collector (read-only). Models a protocol-gateway lane separate
# from the S7comm collector, so an OPC UA device can be ingested independently.
# Demo target: the opc-plc OPC UA server simulator.
[agent]
  interval = "1s"
  flush_interval = "1s"
  round_interval = true
  omit_hostname = true

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${INFLUX_BUCKET}"

[[inputs.opcua]]
  name_override = "opcua_demo"
  endpoint = "opc.tcp://opc-plc:50000"
  connect_timeout = "15s"
  request_timeout = "10s"
  security_policy = "None"
  security_mode = "None"
  auth_method = "Anonymous"
  [[inputs.opcua.group]]
    namespace = "3"
    identifier_type = "s"
    [[inputs.opcua.group.nodes]]
      name = "fast_counter"
      identifier = "FastUInt1"
    [[inputs.opcua.group.nodes]]
      name = "slow_counter"
      identifier = "SlowUInt1"
    [[inputs.opcua.group.nodes]]
      name = "random_uint"
      identifier = "RandomUnsignedInt32"
    [[inputs.opcua.group.nodes]]
      name = "spike"
      identifier = "SpikeData"
    [[inputs.opcua.group.nodes]]
      name = "dip"
      identifier = "DipData"
